<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bizim Haritamız</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f6f6;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .map-title {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: rgba(255, 255, 255, 0.95);
      padding: 12px 18px;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
      text-align: center;
      min-width: 220px;
    }

    .map-title h1 {
      margin: 0;
      font-size: 18px;
      color: #c62828;
    }

    .map-title p {
      margin: 4px 0 0;
      font-size: 12px;
      color: #555;
    }

    .custom-popup .leaflet-popup-content-wrapper {
      border-radius: 18px;
      padding: 4px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    .custom-popup .leaflet-popup-content {
      margin: 12px;
      width: 260px !important;
    }

    .popup-card h3 {
      margin: 0 0 6px;
      font-size: 18px;
      color: #c62828;
    }

    .popup-card p {
      margin: 0 0 10px;
      font-size: 13px;
      line-height: 1.4;
      color: #444;
    }

    .photo-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .photo-row img {
      width: 120px;
      height: 90px;
      object-fit: cover;
      border-radius: 12px;
      cursor: pointer;
      flex: 0 0 auto;
      border: 1px solid #eee;
      transition: transform 0.2s ease;
    }

    .photo-row img:hover {
      transform: scale(1.04);
    }

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      z-index: 5000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .lightbox.active {
      display: flex;
    }

    .lightbox img {
      max-width: 95vw;
      max-height: 85vh;
      border-radius: 14px;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 32px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="map-title">
    <h1>Placeholder name ❤️</h1>
    <p>buraya çok aşırı havalı ve anlamlı bir açıklama koycam</p>
  </div>

  <div id="map"></div>

  <div id="lightbox" class="lightbox">
    <span class="lightbox-close" id="lightboxClose">&times;</span>
    <img id="lightboxImage" />
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const map = L.map("map");

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    const BASE_PATH = "izmir/";

    const heartIcon = L.divIcon({
      className: "",
      html: `
        <svg width="34" height="34" viewBox="0 0 24 24" fill="#e53935">
          <path d="M12 21s-6.716-4.35-9.193-7.368C.48 10.847 1.133 7.5 3.9 6.4c1.77-.7 3.76-.2 5.1 1.3 1.34-1.5 3.33-2 5.1-1.3 2.767 1.1 3.42 4.447 1.093 7.232C18.716 16.65 12 21 12 21z"/>
        </svg>
      `,
      iconSize: [34, 34],
      iconAnchor: [17, 32],
      popupAnchor: [0, -28]
    });

    const locations = [
      {
        title: "Saat Kulesi",
        lat: 38.418713,
        lng: 27.128526,
        note: "Sen, ben ve İzmir'in en klişe lokasyonu.",
        photos: [
          BASE_PATH + "cemmam1.jpg",
          BASE_PATH + "beraber1.jpg"
        ]
      }
    ];

    const bounds = [];

    locations.forEach((loc) => {
      bounds.push([loc.lat, loc.lng]);

      const photoHtml = loc.photos.length
        ? `
          <div class="photo-row">
            ${loc.photos.map(src =>
              `<img src="${src}" onclick="openLightbox('${src}')">`
            ).join("")}
          </div>
        `
        : "";

      const popupHtml = `
        <div class="popup-card">
          <h3>${loc.title}</h3>
          <p>${loc.note}</p>
          ${photoHtml}
        </div>
      `;

      L.marker([loc.lat, loc.lng], { icon: heartIcon })
        .addTo(map)
        .bindPopup(popupHtml, { className: "custom-popup" });
    });

    map.fitBounds(bounds, {
      padding: [50, 50],
      maxZoom: 15
    });

    function openLightbox(src) {
      document.getElementById("lightbox").classList.add("active");
      document.getElementById("lightboxImage").src = src;
    }

    document.getElementById("lightboxClose").onclick = () => {
      document.getElementById("lightbox").classList.remove("active");
    };

    document.getElementById("lightbox").onclick = (e) => {
      if (e.target.id === "lightbox") {
        document.getElementById("lightbox").classList.remove("active");
      }
    };
  </script>
</body>
</html>
